<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <style>body{font-family:Arial;text-align:center;margin-top:100px;} a{color:#27ae60;font-weight:bold;}</style>
</head>
<body>
    <h1>Добро пожаловать</h1>
    <p>Заполните форму ниже и нажмите «Оплатить».</p>

    <form id="payment-form">
        <div>
            <label for="product">Название продукта:</label>
            <input type="text" id="product" name="product" required>
        </div>
        <div>
            <label for="amount">Сумма:</label>
            <input type="number" id="amount" name="amount" required>
        </div>
        <button type="submit">Оплатить</button>
    </form>

    <script>
        document.getElementById('payment-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const params = new URLSearchParams(new FormData(e.target));
            // перенаправляем на страницу успеха с параметрами
            window.location.href = '/payment/success?' + params.toString();
        });
    </script>
</body>
</html>
